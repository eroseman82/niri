# sudo pacman -S ffmpegthumbnailer

[manager]
ratio = [ 1, 3, 4 ]
show_hidden = true

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" }
]
play = [
    { run = 'xdg-open "$@"', desc = "Open", block = true }
]

[open]
rules = [
    # 1. Match text files explicitly
    { mime = "text/*", use = "edit" },
    # 2. Match common config extensions
    { name = "*.toml|*.lua|*.conf|*.json", use = "edit" },
    # 3. Fallback for everything else
    { name = "*", use = "edit" }
]
# rules = [
#     { name = "*", use = [ "edit", "play" ] }
# ]
#
# [preview]
image_cache_size = 10485760
image_filter = "lanczos3"
# If you use Kitty, Alacritty, or WezTerm, try forcing "kitty"
# If you use Foot, use "sixel"
preview_protocol = "kitty"

[plugin]
prepend_previewers = [
    { name = "*.mp4|*.mkv|*.avi|*.mov", run = "video" },
    { name = "*.pdf", run = "pdf" },
    { mime = "image/*", run = "image" }
]




